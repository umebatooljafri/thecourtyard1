<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
       body{
            font-family: 'Montserrat' , sans-serif;
            background: #F5F1EB;
            margin: 0;
            color: yyyyyyy#2D2D2D;
        }
        .container{
            max-width: 500px;
            margin: 80px auto;
            background: white;
            padding: 50px 40px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            text-align: center;
        }
        h1{
            font-family: 'Playfair Display' , serif;
            font-size: 36px;
            color: #6B7A5A;
            margin-bottom: 10PX;
        }
        p{
            color: #666;
            margin-bottom: 30PX;
        }
        input,select{
           width: 100%;
           padding: 14px;
           margin-bottom: 20px;
           border: 1px solid #ddd;
           border-radius: 4px;
           font-family: 'Mantserrat' , sans-serif;
           font-size: 15px;
           box-sizing: border-box; 
        }
        input:focus, select:focus{
            outline: none;
            border-color: #C76D3F;

        }
        .btn{
          width: 100%;
          padding: 15px;
          background: #C76D3F;
          color: WHITE;
          border: none;
          border-radius: 4px;
          font-size: 16px;
          font-weight: 500;
          cursor: pointer;
          transition: 0.3s;
        }
        .btn:hover{
            background: #A65A32;
        }


    </style>
</head>
<body>
    <div class="container">
        <h1>Reserve a Table</h1>
        <p>Book your spot at the Courtyard terrace</p>

        <form>
            <input type="text" placeholder="Your Name" required>
            <input type="email" placeholder="Email" required>
            <input type="tel" placeholder="Phone number" required>
            <input type="date" required>
            <input type="time" required>
            <select required>
                <option value="">Select Guests</option>
                <option>1-2 People</option>
                <option>3-4 People</option>
                <option>5-6 People</option>
                <option>7+ People</option>
            </select>
            <button type="submit" class="btn">Confirm Reservation</button>
        </form>
    </div>
</body>
</html>
